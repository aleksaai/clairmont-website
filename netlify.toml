[build]
  command = "npm run build"
  publish = "dist"

# Customer-facing payment portal: proxied to the Supabase Edge Function.
# Must come BEFORE the SPA fallback. `force = true` overrides any matching file
# in `dist/`. Both GET (render) and POST (create Stripe session) go through here.
[[redirects]]
  from = "/pay"
  to = "https://ufnxliieaejdvxcanqux.supabase.co/functions/v1/payment-portal"
  status = 200
  force = true

# SPA fallback: let React Router handle all client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
