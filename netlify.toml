[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# /pay is handled by a Netlify Function (see public/_redirects). The function
# proxies through to the Supabase payment-portal edge function, preserving the
# upstream Content-Type and body — a direct external `200!` redirect gets
# Netlify's sandbox CSP applied, which breaks rendering.
